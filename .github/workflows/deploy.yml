name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    environment: production

    defaults:
      run:
        working-directory: notification-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: notification-service/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Create .env.production from GitHub Secrets
        run: |
          cat > .env.production << EOF
          PORT=${{ secrets.PORT }}
          NODE_ENV=production
          API_KEY=${{ secrets.API_KEY }}
          SQLITE_PATH=${{ secrets.SQLITE_PATH }}
          SMTP_HOST=${{ secrets.SMTP_HOST }}
          SMTP_PORT=${{ secrets.SMTP_PORT }}
          SMTP_SECURE=${{ secrets.SMTP_SECURE }}
          SMTP_USER=${{ secrets.SMTP_USER }}
          SMTP_APP_PASSWORD=${{ secrets.SMTP_APP_PASSWORD }}
          EMAIL_FROM_NAME=${{ secrets.EMAIL_FROM_NAME }}
          EMAIL_FROM_ADDRESS=${{ secrets.EMAIL_FROM_ADDRESS }}
          EOF

      - name: Prepare deploy bundle
        run: |
          mkdir -p deploy-bundle
          cp -r dist package.json package-lock.json ecosystem.config.cjs .env.production deploy-bundle/

      - name: Copy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          source: deploy-bundle/
          target: ${{ secrets.DEPLOY_PATH }}
          strip_components: 1

      - name: Install and restart on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -e
            cd "${{ secrets.DEPLOY_PATH }}"
            mkdir -p data logs
            npm ci --omit=dev
            if pm2 describe notification-service > /dev/null 2>&1; then
              pm2 restart ecosystem.config.cjs --env production --update-env
            else
              pm2 start ecosystem.config.cjs --env production
            fi
            pm2 save
            echo "Deploy complete — $(date -u +%Y-%m-%dT%H:%M:%SZ)"
