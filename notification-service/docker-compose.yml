version: '3.9'

services:
  notification-service:
    build:
      context: .
      target: production
    container_name: notification-service
    ports:
      - "3001:3001"
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./logs:/app/logs
    networks:
      - notify-net

  redis:
    image: redis:7-alpine
    container_name: notify-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - notify-net

  postgres:
    image: postgres:16-alpine
    container_name: notify-postgres
    environment:
      POSTGRES_DB: notifications
      POSTGRES_USER: notifyuser
      POSTGRES_PASSWORD: strongpassword
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notifyuser -d notifications"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - notify-net

networks:
  notify-net:
    driver: bridge

volumes:
  redis_data:
  pg_data:
