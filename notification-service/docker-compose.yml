version: '3.9'

services:
  notification-service:
    build:
      context: .
      target: production
    container_name: notification-service
    ports:
      - "3001:3001"
    env_file:
      - .env
    restart: unless-stopped
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
    networks:
      - notify-net

networks:
  notify-net:
    driver: bridge
