# Render Blueprint — https://render.com
# Connect repo at render.com → New → Blueprint → select this repo
# Or: New Web Service → connect GitHub → set Root Directory: notification-service

services:
  - type: web
    name: notification-service
    runtime: node
    plan: free
    region: oregon
    rootDir: notification-service
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: SQLITE_PATH
        value: ./data/notifications.db
      # Add the rest in Render Dashboard → Environment (secrets):
      # API_KEY, SMTP_USER, SMTP_APP_PASSWORD, EMAIL_FROM_ADDRESS, etc.
